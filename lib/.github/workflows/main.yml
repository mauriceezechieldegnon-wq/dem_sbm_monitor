name: Flutter Build Artifacts

on:
  push:
    branches: [ "main" ] # Déclenche le build à chaque push sur main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0' # Ou ta version actuelle

      - name: Install dependencies
        run: flutter pub get

      # Génération de l'APK (Android)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # Optionnel : Génération du Web
      - name: Build Web
        run: flutter build web --release

      # UPLOAD DE L'APK SUR GITHUB
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dem-sbm-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # UPLOAD DU WEB SUR GITHUB
          name: dem-sbm-web-bundle
          path: build/web/