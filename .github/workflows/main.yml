name: Multi-Platform Build Artifacts

on:
  push:
    branches: [ "main" ]

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dem-sbm-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Long Paths
        run: reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        shell: powershell

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        shell: bash # On utilise Bash pour éviter les erreurs de disque C:
        run: |
          # On définit un cache court à la racine du runner
          export PUB_CACHE="C:\\p"
          mkdir -p $PUB_CACHE
          
          flutter pub get
          flutter create . --platforms=windows
          flutter build windows --release --no-tree-shake-icons
          
      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: dem-sbm-windows-executable
          path: build/windows/x64/runner/Release/